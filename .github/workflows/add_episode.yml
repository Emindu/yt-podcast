name: Add Episode

on:
  workflow_dispatch:
    inputs:
      url:
        description: "YouTube URL"
        required: true
        type: string

jobs:
  add-episode:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js (required for yt-dlp n-challenge)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          sudo apt-get install -y ffmpeg
          pip install yt-dlp feedgen requests

      - name: List available formats (debug)
        run: yt-dlp --extractor-args "youtube:player_client=tv_embedded" --list-formats "${{ github.event.inputs.url }}" || true

      - name: Download and add episode
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: python scripts/add_episode.py "${{ github.event.inputs.url }}"

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/episodes.json docs/feed.xml
          git diff --staged --quiet || git commit -m "Add episode from ${{ github.event.inputs.url }}"
          git push
